name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🏗️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Build Project
        run: npm run build

      - name: 📂 Sync files to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Exclude node_modules or unneeded source files to save time
          # Hanya upload folder build dan config
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            mkzip.ps1
            scratch*
            README.md
          # Path di cPanel (kosongkan '/' jika FTP login langsung mengarah ke folder project)
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          
      - name: 🔄 Restart Node.js App (Passenger)
        # cPanel / Phusion Passenger restart mechanism
        # Creates a restart.txt inside the tmp directory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_TARGET_DIR }}tmp/
          local-dir: ./
          # Just upload a dummy file as restart.txt
          exclude: "**" # Exclude everything
          # This step is a bit tricky with FTP, maybe we can just let user restart it manually first,
          # or we can use an FTP client to create tmp/restart.txt
