name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🏗️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'absen_next/package-lock.json'

      - name: 📦 Install Dependencies
        working-directory: absen_next
        run: npm ci

      - name: 🚀 Build Project
        working-directory: absen_next
        run: npm run build

      - name: 📂 Sync files to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Path to upload is inside absen_next
          local-dir: ./absen_next/
          # Path di cPanel
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          # Exclude node_modules or unneeded source files
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            mkzip.ps1
            scratch*
            README.md
