name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main
      - feature/development

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare Production Files
        run: |
          mkdir deploy_dist
          # Salin .next tapi TANPA folder cache (terlalu besar)
          cp -r .next deploy_dist/
          rm -rf deploy_dist/.next/cache
          cp -r public deploy_dist/
          cp package.json deploy_dist/
          cp package-lock.json deploy_dist/
          cp next.config.ts deploy_dist/
          cp server.js deploy_dist/
          # Buat trigger restart otomatis untuk Passenger di cPanel dengan konten dinamis
          mkdir -p deploy_dist/tmp
          echo "Deploy SHA: ${{ github.sha }} | Time: $(date +%s)" > deploy_dist/tmp/restart.txt


      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_dist/
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          dangerous-clean-slate: false
          # Timeout diperpanjang menjadi 10 menit untuk koneksi lambat
          timeout: 600000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.next/cache/**
