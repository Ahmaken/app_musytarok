name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main
      - feature/development # Menjalankan workflow saat push ke main atau feature/development

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare Production Files
        run: |
          mkdir deploy_dist
          cp -r .next deploy_dist/
          cp -r public deploy_dist/
          cp package.json deploy_dist/
          cp package-lock.json deploy_dist/
          cp next.config.ts deploy_dist/
          cp server.js deploy_dist/

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Menunjuk ke folder dist produksi agar transfer cepat & bersih
          local-dir: ./deploy_dist/
          # Tentukan target direktori menggunakan secret yang sudah di-set
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          # Mengabaikan pengecekan perubahan lama untuk menjamin kecocokan penuh
          dangerous-clean-slate: false
